name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            pkg: ftgrep_Linux_x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            pkg: ftgrep_Linux_arm64
            cross: true
          - target: x86_64-apple-darwin
            os: macos-13
            pkg: ftgrep_Darwin_x86_64
          - target: aarch64-apple-darwin
            os: macos-14
            pkg: ftgrep_Darwin_arm64
          # TODO: support windows
          # - target: x86_64-pc-windows-msvc
          #   os: windows-latest
          #   pkg: ftgrep_Windows_x86_64
          # - target: aarch64-pc-windows-msvc
          #   os: windows-latest
          #   pkg: ftgrep_Windows_arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux aarch64)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          TARGET="${{ matrix.target }}"
          PKG_NAME="${{ matrix.pkg }}"

          mkdir -p "dist/${PKG_NAME}"
          cp "target/${TARGET}/release/ftgrep" "dist/${PKG_NAME}/"

          cd dist
          tar czf "${PKG_NAME}.tar.gz" "${PKG_NAME}"
          if command -v sha256sum &>/dev/null; then
            sha256sum "${PKG_NAME}.tar.gz" | awk '{print $1}' > "${PKG_NAME}.tar.gz.sha256"
          else
            shasum -a 256 "${PKG_NAME}.tar.gz" | awk '{print $1}' > "${PKG_NAME}.tar.gz.sha256"
          fi

          gh release upload "$VERSION" "${PKG_NAME}.tar.gz" "${PKG_NAME}.tar.gz.sha256" --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = "${{ github.event.release.tag_name }}"
          $TARGET = "${{ matrix.target }}"
          $PKG_NAME = "${{ matrix.pkg }}"

          New-Item -ItemType Directory -Path "dist/${PKG_NAME}" -Force
          Copy-Item "target/${TARGET}/release/ftgrep.exe" "dist/${PKG_NAME}/"

          Set-Location dist
          Compress-Archive -Path "${PKG_NAME}" -DestinationPath "${PKG_NAME}.zip"

          $SHA = (Get-FileHash "${PKG_NAME}.zip" -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path "${PKG_NAME}.zip.sha256" -Value $SHA

          gh release upload "$VERSION" "${PKG_NAME}.zip" "${PKG_NAME}.zip.sha256" --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  update-homebrew:
    name: Update Homebrew formula
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: amaya382/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Update Homebrew formula
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          VERSION="$RELEASE_TAG"
          VER="${VERSION#v}"
          LATEST_URL="https://github.com/amaya382/ftgrep/releases/latest/download"

          fetch_sha() {
            curl -fsSL "${LATEST_URL}/${1}.tar.gz.sha256"
          }

          LINUX_X86_64_SHA="$(fetch_sha ftgrep_Linux_x86_64)"
          LINUX_ARM64_SHA="$(fetch_sha ftgrep_Linux_arm64)"
          DARWIN_X86_64_SHA="$(fetch_sha ftgrep_Darwin_x86_64)"
          DARWIN_ARM64_SHA="$(fetch_sha ftgrep_Darwin_arm64)"

          {
            echo '# typed: false'
            echo '# frozen_string_literal: true'
            echo ''
            echo 'class Ftgrep < Formula'
            echo '  desc "Full-text grep tool with Japanese morphological analysis indexing"'
            echo '  homepage "https://github.com/amaya382/ftgrep"'
            echo "  version \"$VER\""
            echo '  license "MIT"'
            echo ''
            echo '  on_macos do'
            echo '    if Hardware::CPU.intel?'
            echo "      url \"$LATEST_URL/ftgrep_Darwin_x86_64.tar.gz\""
            echo "      sha256 \"$DARWIN_X86_64_SHA\""
            echo ''
            echo '      def install'
            echo '        bin.install "ftgrep"'
            echo '      end'
            echo '    end'
            echo '    if Hardware::CPU.arm?'
            echo "      url \"$LATEST_URL/ftgrep_Darwin_arm64.tar.gz\""
            echo "      sha256 \"$DARWIN_ARM64_SHA\""
            echo ''
            echo '      def install'
            echo '        bin.install "ftgrep"'
            echo '      end'
            echo '    end'
            echo '  end'
            echo ''
            echo '  on_linux do'
            echo '    if Hardware::CPU.intel? && Hardware::CPU.is_64_bit?'
            echo "      url \"$LATEST_URL/ftgrep_Linux_x86_64.tar.gz\""
            echo "      sha256 \"$LINUX_X86_64_SHA\""
            echo ''
            echo '      def install'
            echo '        bin.install "ftgrep"'
            echo '      end'
            echo '    end'
            echo '    if Hardware::CPU.arm? && Hardware::CPU.is_64_bit?'
            echo "      url \"$LATEST_URL/ftgrep_Linux_arm64.tar.gz\""
            echo "      sha256 \"$LINUX_ARM64_SHA\""
            echo ''
            echo '      def install'
            echo '        bin.install "ftgrep"'
            echo '      end'
            echo '    end'
            echo '  end'
            echo 'end'
          } > homebrew-tap/Formula/ftgrep.rb

          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ftgrep.rb
          git commit -m "Update ftgrep to ${VERSION}"
          git push
